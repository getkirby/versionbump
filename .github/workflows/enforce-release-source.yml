name: Enforce release source branch

on:
  pull_request:
    branches:
      - main

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch
        run: |
          BRANCH="${{ github.head_ref }}"
          if ! echo "$BRANCH" | grep -qE '^release/[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::PRs into main must come from a release/X.Y.Z branch (got '$BRANCH')"
            exit 1
          fi
          echo "OK: source branch '$BRANCH' is a valid release branch"
